<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ALS Inventory — Web App v1.95c renewed</title>
  <style>
    :root{
      --primary:#0b5fff; --on-primary:#fff; --muted:#6b7280; --card:#fff; --border:#e6e9ee; --radius:10px;
      font-family: "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      font-size:15px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:#fff;color:#0f172a}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}
    .brand img{height:48px}
    .brand .title{font-weight:800}
    .top-actions{display:flex;gap:8px}
    .btn{background:var(--primary);color:var(--on-primary);border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:700}
    .btn.secondary{background:#374151}
    .wrap{max-width:1200px;margin:18px auto;padding:12px;display:grid;grid-template-columns:1fr;gap:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
    label{display:block;margin-bottom:6px;font-weight:700}
    input,select,textarea{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:#fff}
    .small{font-size:13px;color:var(--muted)}
    .tableWrap{overflow:auto;border-radius:8px;border:1px solid var(--border);background:#fff;margin-top:8px}
    table{width:100%;border-collapse:collapse;min-width:720px}
    thead th{background:#f3f6fb;padding:10px;text-align:left;position:sticky;top:0;z-index:3}
    th,td{padding:10px;border-bottom:1px solid #eef0f4;vertical-align:top}
    .readerContainer{margin-top:8px;display:none;position:relative}
    .readerContainer.active{display:block}
    .scannerBox{width:100%;max-width:520px;height:auto;border-radius:8px;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
    video.scannerVideo{width:100%;height:auto;max-height:360px;object-fit:cover}
    .closeCam{position:absolute;z-index:30;right:8px;top:8px;background:rgba(0,0,0,0.55);color:#fff;border:none;padding:6px 8px;border-radius:6px;cursor:pointer}
    .cameraBtn{background:#f3f6fb;border:1px solid var(--border);padding:8px;border-radius:8px;cursor:pointer}
    .statusMsg{margin-top:8px;font-size:13px;color:var(--muted)}
    @media (max-width:980px){ .wrap{padding:10px} table{min-width:600px} }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
  // External-host compatibility layer for GitHub Pages.
  // Keeps the existing google.script.run call style working via JSONP.
  const API_URL = "https://script.google.com/a/macros/citywideambulance.com/s/AKfycbxEjxXEh0BMTkbVIym7tTJivDE35vHzBACh2MkOKsB7xoUNNUNaYdIkxnGENJGwMTssjA/exec";

  function _alsJsonpCall(action, data, onSuccess, onFailure) {
    const callbackName = "__als_cb_" + Math.random().toString(36).slice(2);
    const cleanup = () => {
      try { delete window[callbackName]; } catch (e) {}
      const old = document.getElementById(callbackName);
      if (old) old.remove();
    };

    window[callbackName] = function(resp) {
      cleanup();
      try {
        if (onSuccess) onSuccess(resp);
      } catch (err) {
        console.error(err);
        if (onFailure) onFailure(err);
      }
    };

    let url = API_URL + "?action=" + encodeURIComponent(action) + "&callback=" + encodeURIComponent(callbackName);
    if (typeof data !== "undefined" && data !== null) {
      url += "&data=" + encodeURIComponent(JSON.stringify(data));
    }

    const s = document.createElement("script");
    s.id = callbackName;
    s.src = url;
    s.onerror = function() {
      cleanup();
      if (onFailure) onFailure(new Error("JSONP load failed for " + action));
      else console.error("JSONP load failed for " + action);
    };
    document.head.appendChild(s);
  }

  function _alsProxyRunner(state) {
    return new Proxy(state, {
      get(target, prop) {
        if (prop === "withSuccessHandler") {
          return function(fn) {
            return _alsProxyRunner({ success: fn || null, failure: target.failure || null });
          };
        }
        if (prop === "withFailureHandler") {
          return function(fn) {
            return _alsProxyRunner({ success: target.success || null, failure: fn || null });
          };
        }
        if (prop === "constructor") return undefined;
        return function() {
          const args = Array.prototype.slice.call(arguments);
          const payload = (args.length === 0) ? null : (args.length === 1 ? args[0] : args);
          _alsJsonpCall(
            String(prop),
            payload,
            function(resp) {
              if (target.success) target.success(resp);
            },
            function(err) {
              if (target.failure) target.failure(err);
              else console.error(err);
            }
          );
        };
      }
    });
  }

  window.google = window.google || {};
  google.script = google.script || {};
  google.script.run = _alsProxyRunner({ success: null, failure: null });
  </script>
</head>
<body>
  <div class="topbar" role="banner">
    <div class="brand">
      <img src="https://images.squarespace-cdn.com/content/v1/562e914be4b07324c716280e/1445893787747-ZY45YJQ73Y5V4688H3SD/Citywide%5BNew%5D.gif?format=1000w" alt="logo">
      <div>
        <div class="title">ALS Inventory — Web App v1.95c renewed</div>
        <div class="small">Signed in as: <span id="currentUser">...</span></div>
      </div>
    </div>

    <div class="top-actions" role="navigation" aria-label="top actions">
      <button id="btnDashboard" class="btn">Dashboard</button>
      <button id="btnCreate" class="btn">Create Item</button>
      <button id="btnRestock" class="btn">ALS Bag Restock</button>
      <button id="btnRefresh" class="btn secondary">Refresh</button>
    </div>
  </div>

  <div class="wrap" role="main">
    <!-- Dashboard -->
    <div id="dashboardCard" class="card" style="display:block">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Dashboard</h3>
        <div style="display:flex;align-items:center;gap:12px">
          <label class="small">View:
            <select id="dashboardViewSelect">
              <option value="items">Items</option>
              <option value="bags">Bags (select one)</option>
            </select>
          </label>
        </div>
      </div>

      <div style="height:12px"></div>

      <div id="itemsControls">
        <label><input type="checkbox" id="hideExpired" checked> Exclude expired</label>
      </div>

      <div id="bagSelectorWrap" style="margin-top:8px;display:none">
        <label>Select Bag</label>
        <select id="dashboardBagSelect"></select>
      </div>

      <div class="tableWrap" style="margin-top:12px">
        <table>
          <thead id="dashboardHead"><tr></tr></thead>
          <tbody id="dashboardBody">
            <tr><td class="small">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Create -->
    <div id="createCard" class="card" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Create Inventory Item</h3>
      </div>

      <div style="height:10px"></div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">
        <div>
          <label>Category</label>
          <select id="createCategory"></select>
        </div>

        <div>
          <label>Item name (select or type)</label>
          <input id="createItemName" list="reqList" placeholder="Type or choose required item">
          <datalist id="reqList"></datalist>
        </div>

        <div>
          <label>Barcode</label>
          <div style="display:flex;gap:8px">
            <input id="createBarcode" placeholder="Scan or type barcode">
            <button id="createCameraBtn" class="cameraBtn" title="Open camera">📷</button>
          </div>
          <div id="createScanner" class="readerContainer">
            <div class="scannerBox" id="createScannerBox"></div>
            <button class="closeCam" id="createCloseCam" title="Close camera" style="display:none">✕</button>
            <div id="createScannerStatus" class="statusMsg"></div>
          </div>
        </div>

        <div>
          <label>Lot number</label>
          <input id="createLot" placeholder="Lot number">
        </div>

        <div>
          <label>Expiration</label>
          <input id="createExp" type="date">
        </div>

        <div>
          <label>Quantity</label>
          <input id="createQty" type="number" min="0" value="1">
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="createSave" class="btn">Save item</button>
        <button id="createClear" class="btn secondary">Clear</button>
      </div>
    </div>

    <!-- Bag restock -->
    <div id="bagCard" class="card" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">ALS Bag Restock</h3>
        <div class="small">Scan items, enter Qty Added, submit</div>
      </div>

      <div style="height:10px"></div>

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <label>Bag</label>
        <select id="bagSelect"></select>
        <button id="resetRows" class="btn secondary">Reset rows</button>
        <button id="submitAll" class="btn">Submit All</button>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th style="min-width:240px">Scan / Lot # / Name</th>
              <th>Item Name</th>
              <th>Lot</th>
              <th>Expiration</th>
              <th>Category</th>
              <th>Qty Added</th>
              <th>Status / Replace</th>
            </tr>
          </thead>
          <tbody id="restockBody"></tbody>
        </table>
      </div>

      <div id="restockScannerContainer" class="readerContainer" style="display:none; margin-top:12px">
        <div class="scannerBox" id="restockScannerBox"></div>
        <button class="closeCam" id="restockCloseCam" title="Close camera">✕</button>
        <div id="restockScannerStatus" class="statusMsg"></div>
      </div>
    </div>
  </div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  // scanner state (single global scanner)
  let scannerStream = null;
  let scannerVideo = null;
  let scannerCanvas = null;
  let scannerCtx = null;
  let scanning = false;
  let barcodeDetector = null;
  let scanRAF = null;
  let currentTargetInput = null; // id string e.g. 'createBarcode' or 'scan-1'

  // caches
  let dashboardData = null;
  let requiredItems = [];
  let bagList = [];
  let categories = [];

  function escapeHTML(s){ if(s===null||s===undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.addEventListener('DOMContentLoaded', ()=>{
    // top nav
    $('btnDashboard').addEventListener('click', ()=> showCard('dashboardCard'));
    $('btnCreate').addEventListener('click', ()=> showCard('createCard'));
    $('btnRestock').addEventListener('click', ()=> showCard('bagCard'));
    $('btnRefresh').addEventListener('click', ()=> refreshAll());

    // dashboard behaviour
    $('dashboardViewSelect').addEventListener('change', onDashboardViewToggle);
    $('dashboardBagSelect').addEventListener('change', ()=> renderDashboardBags());
    $('hideExpired').addEventListener('change', ()=> renderDashboardItems());

    // create scanner button
    $('createCameraBtn').addEventListener('click', ()=> {
      const wrap = $('createScanner');
      // toggle
      if(wrap.classList.contains('active')){ stopScanner(); return; }
      startScanner('createScannerBox', 'createBarcode', 'createScanner', 'createScannerStatus', 'createCloseCam');
    });
    $('createCloseCam').addEventListener('click', stopScanner);

    // create save/clear
    $('createSave').addEventListener('click', createItemClient);
    $('createClear').addEventListener('click', clearCreateForm);

    // restock controls
    $('resetRows').addEventListener('click', initRestockRows);
    $('submitAll').addEventListener('click', submitAll);
    $('restockCloseCam').addEventListener('click', stopScanner);

    // initial loads
    refreshAll();
    showCard('dashboardCard');

    // populate current user
    if(window.google && google.script && google.script.run){
      google.script.run.withSuccessHandler(email => { $('currentUser').textContent = email || 'unknown'; }).getActiveUserEmail();
    } else { $('currentUser').textContent = 'unknown'; }
  });

  // UI helpers
  function showCard(id){ ['dashboardCard','createCard','bagCard'].forEach(c=> $(c).style.display = (c===id)?'block':'none'); if(id !== 'createCard' && $('createScanner') && $('createScanner').classList.contains('active')) stopScanner(); if(id !== 'bagCard' && $('restockScannerContainer') && $('restockScannerContainer').style.display === 'block') stopScanner(); }

  // refresh data
  function refreshAll(){
    loadDashboardData();
    loadRequiredItems();
    loadBagList();
    loadCategories();
    initRestockRows();
  }

  function loadDashboardData(){
    if(!(window.google && google.script && google.script.run)){ dashboardData = null; renderDashboardItems(); return; }
    google.script.run.withSuccessHandler(data => { dashboardData = data || {stock:[], required:[], bags:[]}; populateDashboardBagSelect(); renderDashboard(); }).getDashboardData();
  }

  function loadRequiredItems(){
    if(!(window.google && google.script && google.script.run)){ requiredItems = []; populateReqDatalist(); return; }
    google.script.run.withSuccessHandler(items => { requiredItems = items || []; populateReqDatalist(); }).getRequiredItems();
  }

  function loadBagList(){
    if(!(window.google && google.script && google.script.run)){ bagList = []; populateBagSelects(); return; }
    google.script.run.withSuccessHandler(list => { bagList = list || []; populateBagSelects(); }).getBagList();
  }

  function loadCategories(){
    if(!(window.google && google.script && google.script.run)){ categories = []; populateCategories(); return; }
    google.script.run.withSuccessHandler(cats => { categories = cats || []; populateCategories(); }).getCategories();
  }

  function populateReqDatalist(){
    const dl = $('reqList'); if(!dl) return; dl.innerHTML = '';
    (requiredItems||[]).forEach(it=>{ const o=document.createElement('option'); o.value=it.name; dl.appendChild(o); });
    $('createItemName').addEventListener('input', function(){ const v=(this.value||'').trim().toLowerCase(); const found=(requiredItems||[]).find(r=> (r.name||'').toLowerCase()===v); if(found) $('createCategory').value = found.category || ''; });
  }

  function populateCategories(){ const sel = $('createCategory'); if(!sel) return; sel.innerHTML = '<option value="">-- none --</option>'; (categories||[]).forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); }); }

  function populateBagSelects(){ const sel=$('bagSelect'), dash=$('dashboardBagSelect'); [sel,dash].forEach(s=>{ if(!s) return; s.innerHTML='<option value="">-- select --</option>'; (bagList||[]).forEach(b=>{ const o=document.createElement('option'); o.value=b; o.textContent=b; s.appendChild(o); }); }); }

  function populateDashboardBagSelect(){ const sel=$('dashboardBagSelect'); if(!sel) return; sel.innerHTML='<option value="">-- select bag --</option>'; if(dashboardData && dashboardData.bags && dashboardData.bags.length){ dashboardData.bags.forEach(b=>{ const o=document.createElement('option'); o.value=b.bagId || b; o.textContent = b.bagId || b; sel.appendChild(o); }); } }

  // DASHBOARD renderers
  function onDashboardViewToggle(){ const v=$('dashboardViewSelect').value; $('bagSelectorWrap').style.display = v==='bags' ? 'block' : 'none'; renderDashboard(); }
  function renderDashboard(){ const view=$('dashboardViewSelect').value||'items'; if(view==='items') renderDashboardItems(); else renderDashboardBags(); }

  function renderDashboardItems(){
    const body=$('dashboardBody'); const head=$('dashboardHead').querySelector('tr');
    head.innerHTML = '<th>Item Name</th><th>Barcode</th><th>Lot</th><th>Expiration</th><th>Remaining</th><th>Category</th><th>Status</th>';
    body.innerHTML = '<tr><td class="small">No data</td></tr>';
    if(!dashboardData || !dashboardData.stock) return;
    const hideExpired = $('hideExpired').checked;
    const rows = dashboardData.stock.filter(r => !(hideExpired && r.status === 'Expired'));
    if(rows.length===0){ body.innerHTML = '<tr><td colspan="7" class="small">No stock</td></tr>'; return; }
    body.innerHTML = '';
    rows.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${escapeHTML(r.name)}</td><td>${escapeHTML(r.barcode)}</td><td>${escapeHTML(r.lotNumber)}</td><td>${escapeHTML(r.expirationDate)}</td><td>${escapeHTML(r.remaining)}</td><td>${escapeHTML(r.category)}</td><td>${escapeHTML(r.status)}</td>`;
      body.appendChild(tr);
    });
  }

  function renderDashboardBags(){
    const selectedBag = $('dashboardBagSelect').value;
    const body = $('dashboardBody');
    const head = $('dashboardHead').querySelector('tr');
    head.innerHTML = '<th>Required Item</th><th>Required Qty</th><th>Provided Qty</th><th>Items (exp / lot)</th>';
    body.innerHTML = '<tr><td colspan="4" class="small">Select a bag</td></tr>';
    if(!selectedBag) return;
    if(!(window.google && google.script && google.script.run)){ body.innerHTML='<tr><td colspan="4">Server unavailable</td></tr>'; return; }
    google.script.run.withSuccessHandler(results=>{
      body.innerHTML = '';
      if(!results || results.length===0){ body.innerHTML = '<tr><td colspan="4" class="small">No required items</td></tr>'; return; }
      results.forEach(r=>{
        const providedQty = (r.items || []).reduce((s,i)=> s + (Number(i.qty)||0), 0);
        const itemsHtml = (r.items || []).map(it => `<div style="padding:4px 0">${escapeHTML(it.exp||'')} &nbsp;|&nbsp; ${escapeHTML(it.lot||'')}</div>`).join('');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${escapeHTML(r.name)}</td><td>${escapeHTML(String(r.requiredQty))}</td><td>${escapeHTML(String(providedQty))}</td><td>${itemsHtml}</td>`;
        body.appendChild(tr);
      });
    }).withFailureHandler(err=>{ console.error(err); body.innerHTML = '<tr><td colspan="4" class="small">Failed to load bag contents</td></tr>'; }).getBagContents(selectedBag);
  }

  // CREATE item functions
  function clearCreateForm(){ $('createItemName').value=''; $('createBarcode').value=''; $('createLot').value=''; $('createExp').value=''; $('createQty').value=1; $('createCategory').value=''; $('createScannerStatus').textContent=''; }
  function createItemClient(){
    const payload = { name: ($('createItemName').value||'').trim(), barcode: ($('createBarcode').value||'').trim(), lot: ($('createLot').value||'').trim(), exp: ($('createExp').value||'').trim(), qty: Number($('createQty').value||0), category: ($('createCategory').value||'').trim() };
    if(!payload.name){ alert('Item name required'); return; }
    if(!(window.google && google.script && google.script.run)){ alert('Server unavailable'); return; }
    google.script.run.withSuccessHandler(res=>{ if(!res || res.success===false){ alert((res&&res.message)?res.message:'Create failed'); return; } alert('Saved: '+(res.message||'OK')); clearCreateForm(); refreshAll(); }).withFailureHandler(err=>{ console.error(err); alert('createItem failed'); }).createItem(payload);
  }

  // RESTOCK UI
  function initRestockRows(){ const tbody = $('restockBody'); if(!tbody) return; tbody.innerHTML=''; addRestockRow(); addRestockRow(); }
  function addRestockRow(){
    const tbody = $('restockBody');
    const idx = tbody.querySelectorAll('tr').length + 1;
    const tr = document.createElement('tr');
    tr.className = 'restockRow';
    tr.id = 'row-'+idx;
    tr.innerHTML = `
      <td style="min-width:240px">
        <div style="display:flex;gap:6px;align-items:center">
          <input id="scan-${idx}" placeholder="Scan barcode or enter lot/name" />
          <button id="search-${idx}" class="btn small secondary">🔍</button>
          <button id="cam-${idx}" class="cameraBtn">📷</button>
        </div>
        <div id="matches-${idx}"></div>
      </td>
      <td id="name-${idx}" class="col-name"></td>
      <td id="lot-${idx}" class="col-lot"></td>
      <td id="exp-${idx}" class="col-exp"></td>
      <td id="cat-${idx}" class="col-cat"></td>
      <td><input id="qty-${idx}" type="number" min="0" value="1" style="width:84px" /></td>
      <td id="status-${idx}" class="col-status"></td>
    `;
    tbody.appendChild(tr);

    $('search-'+idx).addEventListener('click', ()=> rowLookup(idx));
    $('scan-'+idx).addEventListener('keydown', ev=>{ if(ev.key === 'Enter'){ ev.preventDefault(); rowLookup(idx); }});
    $('cam-'+idx).addEventListener('click', ()=> {
      // open restock scanner container and start live preview
      const readerWrap = $('restockScannerContainer');
      if(readerWrap.style.display === 'block'){ stopScanner(); return; }
      // show reader and start scanner with target input
      readerWrap.style.display = 'block';
      startScanner('restockScannerBox', 'scan-'+idx, 'restockScannerContainer', 'restockScannerStatus', 'restockCloseCam');
    });
  }

  function rowLookup(idx){
    const input = $('scan-'+idx);
    if(!input) return;
    const typed = (input.value||'').trim();
    if(!typed){ alert('Type or scan something first'); return; }
    const searchVal = input.dataset.scannedBarcode || typed;
    if(!(window.google && google.script && google.script.run)){ showInlineAdd(idx, searchVal, !!input.dataset.scannedBarcode); return; }
    google.script.run.withSuccessHandler(res=>{
      if(!res || !res.found || !res.matches || res.matches.length===0){ showInlineAdd(idx, searchVal, !!input.dataset.scannedBarcode); return; }
      if(res.matches.length === 1){ applyMatchToRow(idx, res.matches[0]); return; }
      const holder = $('matches-'+idx); holder.innerHTML = '';
      const list = document.createElement('div'); list.className='matchList';
      res.matches.forEach(m => {
        const item = document.createElement('div'); item.className='matchItem';
        item.innerHTML = `<div><strong>${escapeHTML(m.name||'-')}</strong> — Lot:${escapeHTML(m.lot||'-')} — Exp:${escapeHTML(m.exp||'-')} — Rem:${escapeHTML(m.remaining||0)}</div>`;
        const btn = document.createElement('button'); btn.className='btn small'; btn.textContent='Select';
        btn.addEventListener('click', ()=> applyMatchToRow(idx, m));
        item.appendChild(btn);
        list.appendChild(item);
      });
      holder.appendChild(list);
    }).withFailureHandler(err=>{ console.error(err); alert('Lookup failed'); }).getItem(searchVal);
  }

  function applyMatchToRow(idx, match){
    $('name-'+idx).innerText = match.name || '';
    $('lot-'+idx).innerText = match.lot || '';
    $('exp-'+idx).innerText = match.exp || '';
    $('cat-'+idx).innerText = match.category || '';
    $('status-'+idx).innerText = match.status || '';
    const input = $('scan-'+idx);
    if(input){
      input.dataset.row = match.row || '';
      input.dataset.name = match.name || '';
      input.dataset.lot = match.lot || '';
      input.dataset.exp = match.exp || '';
      if(match.barcode) input.dataset.barcode = match.barcode;
      if(typeof match.remaining !== 'undefined') input.dataset.remaining = String(match.remaining);
      delete input.dataset.scannedBarcode;
    }
    const matchesHolder = $('matches-'+idx); if(matchesHolder) matchesHolder.innerHTML = '';
    maybeAddRow();
  }

  function showInlineAdd(idx, scannedValue, isBarcodeScan){
    const input = $('scan-'+idx);
    if(input) input.value = scannedValue;
    const nameCell = $('name-'+idx), lotCell = $('lot-'+idx), expCell = $('exp-'+idx), catCell = $('cat-'+idx), statusCell = $('status-'+idx);

    if(isBarcodeScan){
      input.dataset.scannedBarcode = scannedValue;
      nameCell.innerHTML = `<input id="newName-${idx}" placeholder="Item Name">`;
      lotCell.innerHTML = `<input id="newLot-${idx}" placeholder="Lot">`;
    } else {
      const numCount = (scannedValue.match(/[0-9]/g) || []).length;
      const letterCount = (scannedValue.match(/[A-Za-z]/g) || []).length;
      const putLot = numCount > letterCount;
      nameCell.innerHTML = `<input id="newName-${idx}" placeholder="Item Name" value="${putLot ? '' : escapeHTML(scannedValue)}">`;
      lotCell.innerHTML = `<input id="newLot-${idx}" placeholder="Lot" value="${putLot ? escapeHTML(scannedValue) : ''}">`;
    }
    expCell.innerHTML = `<input id="newExp-${idx}" type="date">`;
    const cats = Array.from(new Set((requiredItems||[]).map(r=>r.category).filter(Boolean)));
    let catHtml = `<select id="newCat-${idx}"><option value="">(select category)</option>`;
    cats.forEach(c => catHtml += `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`);
    catHtml += `</select>`;
    catCell.innerHTML = catHtml;

    let replaceHtml = `<div style="margin-top:6px"><label class="small">Replacing which required item?</label><select id="replaceReq-${idx}"><option value="">(select)</option>`;
    (requiredItems||[]).forEach(r => replaceHtml += `<option value="${escapeHTML(r.name)}" data-cat="${escapeHTML(r.category||'')}">${escapeHTML(r.name)} (${escapeHTML(r.category||'')})</option>`);
    replaceHtml += `</select></div><div style="margin-top:8px"><button id="addUse-${idx}" class="btn small">Add & Use</button></div>`;
    statusCell.innerHTML = replaceHtml;

    const replaceSel = $('replaceReq-'+idx);
    if(replaceSel) replaceSel.addEventListener('change', function(){ const opt = this.options[this.selectedIndex]; const cat = opt ? opt.getAttribute('data-cat') : ''; const nc = $('newCat-'+idx); if(nc) nc.value = cat || ''; });

    $('addUse-'+idx).addEventListener('click', ()=> {
      const newName = ($('newName-'+idx) && $('newName-'+idx).value || '').trim();
      const newLot = ($('newLot-'+idx) && $('newLot-'+idx).value || '').trim();
      const newExp = ($('newExp-'+idx) && $('newExp-'+idx).value || '').trim();
      const replaceTarget = ($('replaceReq-'+idx) && $('replaceReq-'+idx).value || '').trim();
      const categoryChosen = ($('newCat-'+idx) && $('newCat-'+idx).value || '').trim();
      const qtyVal = Number($('qty-'+idx).value || 1);
      if(!newName){ alert('Item name required'); return; }
      if(!replaceTarget){ alert('Choose required item replaced'); return; }
      const barcodeToSend = $('scan-'+idx).dataset.scannedBarcode || '';
      const payload = { name:newName, barcode: barcodeToSend, lot:newLot, exp:newExp, qty: qtyVal, category: categoryChosen || '' };
      if(!(window.google && google.script && google.script.run)){ alert('Server unavailable'); return; }
      google.script.run.withSuccessHandler(res=>{
        if(!res || res.success===false){ alert((res&&res.message)?res.message:'Create failed'); return; }
        const inp = $('scan-'+idx);
        if(inp){ inp.dataset.row = res.stockRow || ''; inp.dataset.name = newName; inp.dataset.lot = newLot; inp.dataset.exp = res.exp || newExp || ''; if(payload.barcode) inp.dataset.barcode = payload.barcode; }
        $('name-'+idx).innerText = newName;
        $('lot-'+idx).innerText = newLot;
        $('exp-'+idx).innerText = res.exp || newExp || '';
        $('cat-'+idx).innerText = res.category || categoryChosen || '';
        $('status-'+idx).innerText = 'Added';
        const scanInp = $('scan-'+idx);
        if(scanInp) scanInp.dataset.replaceTarget = replaceTarget;
        alert('Item added and ready for Qty Added');
        const m = $('matches-'+idx); if(m) m.innerHTML = '';
        maybeAddRow();
        refreshAll();
      }).withFailureHandler(err=>{ console.error(err); alert('Create failed'); }).createItem(payload);
    });
  }

  function maybeAddRow(){
    const rows = document.querySelectorAll('tr.restockRow');
    if(rows.length===0){ addRestockRow(); return; }
    const lastIndex = rows.length;
    const lastNameCell = $('name-'+lastIndex);
    if(lastNameCell && lastNameCell.innerText && lastNameCell.innerText.trim() !== '') addRestockRow();
  }

  function collectEntries(){
    const bag = $('bagSelect').value || '';
    if(!bag){ alert('Select a bag first'); return null; }
    const rows = Array.from(document.querySelectorAll('tr.restockRow'));
    const entries = [];
    rows.forEach((r,i)=>{
      const idx = i+1;
      const scanField = $('scan-'+idx); if(!scanField) return;
      const qtyVal = Number($('qty-'+idx).value || 0);
      const stockRow = scanField.dataset.row || '';
      const name = scanField.dataset.name || ($('name-'+idx).innerText || '').trim();
      const barcode = scanField.dataset.barcode || scanField.dataset.scannedBarcode || '';
      const lot = scanField.dataset.lot || ($('lot-'+idx).innerText || '').trim();
      const exp = scanField.dataset.exp || ($('exp-'+idx).innerText || '').trim();
      const category = scanField.dataset.category || ($('cat-'+idx).innerText || '').trim();
      const status = ($('status-'+idx).innerText || '').trim();
      const replaceTarget = scanField.dataset.replaceTarget || '';
      if((stockRow || barcode || name) && qtyVal > 0){
        entries.push({ bagId: bag, name: name, barcode: barcode, lot: lot, exp: exp, category: category, status: status, qty: qtyVal, row: Number(stockRow) || '', replaceTarget: replaceTarget });
      }
    });
    return entries;
  }

  function submitAll(){
    const entries = collectEntries();
    if(entries === null) return;
    if(entries.length === 0){ alert('No valid items to submit (scan + Qty Added)'); return; }
    if(!(window.google && google.script && google.script.run)){ alert('Server unavailable — cannot submit'); return; }
    google.script.run.withSuccessHandler(res=>{ if(!res || res.success===false){ alert((res&&res.message)?res.message:'Submit failed'); return; } alert((res&&res.message)?res.message:'Submitted'); initRestockRows(); refreshAll(); }).withFailureHandler(err=>{ console.error(err); alert('submitBag failed'); }).submitBag(entries);
  }

  // ---- LIVE SCANNER using getUserMedia + BarcodeDetector ----
  async function startScanner(boxId, targetInputId, readerContainerId, statusId, closeBtnId){
    // ensure only one scanner active
    if(scanning){ stopScanner(); }
    currentTargetInput = targetInputId;
    // show container
    const readerContainer = readerContainerId ? $(readerContainerId) : null;
    if(readerContainer){ readerContainer.style.display = 'block'; readerContainer.classList.add('active'); }
    const statusEl = statusId ? $(statusId) : null;
    if(statusEl) statusEl.textContent = 'Starting camera...';

    // check getUserMedia available
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      if(statusEl) statusEl.textContent = 'Camera not supported in this browser.';
      alert('Camera not supported in this browser. Use Chrome on desktop or Android for live scanning.');
      return;
    }

    // prepare video element inside box
    const box = $(boxId);
    if(!box) { if(statusEl) statusEl.textContent = 'Scanner container missing'; return; }

    // create video element if not exists
    if(!scannerVideo){
      scannerVideo = document.createElement('video');
      scannerVideo.className = 'scannerVideo';
      scannerVideo.autoplay = true;
      scannerVideo.playsInline = true;
      scannerVideo.muted = true;
      scannerVideo.setAttribute('aria-hidden','true');
      box.innerHTML = '';
      box.appendChild(scannerVideo);
    } else {
      // move video to box if it's elsewhere
      if(scannerVideo.parentNode !== box){ if(scannerVideo.parentNode) scannerVideo.parentNode.removeChild(scannerVideo); box.appendChild(scannerVideo); }
    }

    // canvas for detection
    if(!scannerCanvas){ scannerCanvas = document.createElement('canvas'); scannerCtx = scannerCanvas.getContext('2d'); }

    // prepare BarcodeDetector
    try{
      if('BarcodeDetector' in window){
        try{ barcodeDetector = new BarcodeDetector({formats: ['qr_code','code_128','code_39','ean_13','ean_8','upc_a','upc_e','code_93','itf','data_matrix']}); }
        catch(e){ barcodeDetector = new BarcodeDetector(); }
      } else {
        barcodeDetector = null;
      }
    }catch(e){
      console.error('barcodeDetector init failure', e);
      barcodeDetector = null;
    }

    if(!barcodeDetector){
      if(statusEl) statusEl.textContent = 'BarcodeDetector not available in this browser. Use Chrome on desktop or Android for scanning.';
      alert('This browser does not support BarcodeDetector. Use Chrome (desktop or Android) for live decoding. You can still type barcodes manually.');
      return;
    }

    // request camera with rear-facing preference
    const constraints = { video: { facingMode: { exact: 'environment' } } };
    const fallbackConstraints = { video: { facingMode: 'environment' } };

    try{
      scannerStream = await navigator.mediaDevices.getUserMedia(constraints).catch(()=> navigator.mediaDevices.getUserMedia(fallbackConstraints));
      scannerVideo.srcObject = scannerStream;
      await scannerVideo.play();
      if(statusEl) statusEl.textContent = 'Scanning — point camera at barcode';
      scanning = true;
      // show close button if provided
      const closeBtn = closeBtnId ? $(closeBtnId) : null;
      if(closeBtn) closeBtn.style.display = 'inline-block';
      scanLoop();
    }catch(err){
      console.error('getUserMedia error', err);
      if(statusEl) statusEl.textContent = 'Camera access denied or failed. Grant permission and reload the app.';
      alert('Camera access denied or failed. Make sure you opened the deployed web app URL over HTTPS and allowed camera access.');
      // hide reader container if cannot open camera
      if(readerContainer){ readerContainer.style.display = 'none'; readerContainer.classList.remove('active'); }
      // cleanup
      stopScanner();
    }
  }

  async function scanLoop(){
    if(!scanning || !scannerVideo) return;
    try{
      const w = scannerVideo.videoWidth;
      const h = scannerVideo.videoHeight;
      if(w && h){
        scannerCanvas.width = w;
        scannerCanvas.height = h;
        scannerCtx.drawImage(scannerVideo, 0, 0, w, h);
        // detect
        const detections = await barcodeDetector.detect(scannerCanvas).catch(e => { console.error('detect error', e); return []; });
        if(detections && detections.length){
          const code = detections[0].rawValue || detections[0].rawData || detections[0].value || '';
          if(code){
            // fill target input
            if(currentTargetInput){
              const tgt = $(currentTargetInput);
              if(tgt){
                tgt.value = code;
                tgt.dataset.scannedBarcode = code;
              }
            }
            // if target is a restock row input (scan-N), trigger rowLookup
            const m = currentTargetInput && currentTargetInput.match(/^scan-(\d+)$/);
            if(m){ const idx = Number(m[1]); rowLookup(idx); }
            // stop scanner after a successful read
            stopScanner();
            return;
          }
        }
      }
    }catch(e){ console.error('scanLoop exception', e); }
    scanRAF = requestAnimationFrame(scanLoop);
  }

  function stopScanner(){
    try{
      scanning = false;
      currentTargetInput = null;
      if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF = null; }
      if(scannerVideo){
        try{ scannerVideo.pause(); }catch(e){}
        if(scannerVideo.srcObject){
          const tracks = scannerVideo.srcObject.getTracks ? scannerVideo.srcObject.getTracks() : [];
          tracks.forEach(t => t.stop && t.stop());
        }
        if(scannerVideo.parentNode) scannerVideo.parentNode.removeChild(scannerVideo);
        scannerVideo = null;
      }
      if(scannerStream && scannerStream.getTracks) scannerStream.getTracks().forEach(t => t.stop && t.stop());
      scannerStream = null;
      // hide scanner containers and close buttons
      if($('createScanner')){ $('createScanner').style.display = 'none'; $('createScanner').classList.remove('active'); }
      if($('restockScannerContainer')){ $('restockScannerContainer').style.display = 'none'; $('restockScannerContainer').classList.remove('active'); }
      if($('createCloseCam')) $('createCloseCam').style.display = 'none';
      if($('restockCloseCam')) $('restockCloseCam').style.display = 'none';
    }catch(e){ console.error('stopScanner error', e); }
  }

  // initialize restock rows
  initRestockRows();

  // expose debug
  window.__als_debug = { startScanner, stopScanner };

})();
</script>
